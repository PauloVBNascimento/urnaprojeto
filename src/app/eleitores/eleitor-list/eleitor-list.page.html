<ion-header>
  <ion-toolbar color="dark">
    <ion-buttons slot="start">
      <ion-back-button></ion-back-button>
    </ion-buttons>
    <ion-buttons slot="end">
      <ion-menu-button menu="menu-admin"></ion-menu-button>
    </ion-buttons>
    <ion-title>
      Urna Eletronica
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content color="light">
  <ion-tabs>
    <ion-tab-bar slot="top" color="dark">
      <ion-tab-button [routerLink]="['/inicial']">
        <ion-icon name="file-tray-stacked-outline"></ion-icon>
      </ion-tab-button>
      <ion-tab-button [routerLink]="['/eleitores']">
        <ion-icon name="person-outline"></ion-icon>
      </ion-tab-button>
      <ion-tab-button [routerLink]="['/sobre']">
        <ion-icon name="help-outline"></ion-icon>
      </ion-tab-button>
    </ion-tab-bar>
  </ion-tabs>
  <ion-searchbar placeholder="Procurar(nome)"
    (ionClear)="doSearchClear()"
    (ionChange)="doSearchBarChange($event)">
  </ion-searchbar>

  <ion-list>
    <ion-item-sliding *ngFor="let eleitor of eleitores">
      <ion-item><ion-label>{{eleitor.nome_e}}</ion-label></ion-item>
    <ion-item-options side="start">
    <ion-item-option [routerLink]="['edit', eleitor.id_e]">
      <ion-icon slot="icon-only" name="create-outline" color="dark"></ion-icon>
    </ion-item-option>

    <ion-item-option (click)="delete(eleitor)">
      <ion-icon slot="icon-only" name="person-remove-outline" color="danger"></ion-icon>
    </ion-item-option>
    </ion-item-options>
    </ion-item-sliding>
  </ion-list>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button color="secondary" [routerLink]="['/eleitores/newe']">
      <ion-icon name="person-add-outline" color="light"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
